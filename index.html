<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACESSO VIP LIBERADO</title>
  <style>
    body {
      margin: 0; padding: 0;
      background: linear-gradient(180deg, #000000, #1a0033);
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .container {
      width: 90%;
      max-width: 400px;
      margin: 20px auto;
      padding: 20px;
      border: 2px solid #e91e63;
      border-radius: 20px;
      background: rgba(0,0,0,0.9);
    }
    h2 { font-size: 16px; margin-bottom: 15px; text-transform: uppercase; }
    
    #timer-container { margin: 10px 0; }
    #timer {
      font-size: 70px;
      font-weight: bold;
      color: #ff0066;
      text-shadow: 0 0 20px #ff0066;
    }

    /* FORMATO QUADRADO PERFEITO */
    .video-wrapper {
      width: 100%;
      aspect-ratio: 1 / 1; /* Força o formato quadrado */
      margin: 15px 0;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid #e91e63;
      background: #000;
    }
    .midia-video {
      width: 100%;
      height: 100%;
      object-fit: cover; /* Faz o vídeo preencher o quadrado sem distorcer */
    }

    .liberado {
      font-size: 24px;
      font-weight: bold;
      color: #ffcc00;
      display: none;
      margin: 15px 0;
    }
    .passo-final {
      font-size: 14px;
      color: #ff0066;
      margin: 15px 0;
      font-weight: bold;
      display: none;
      text-transform: uppercase;
    }
    .btn {
      display: none;
      width: 100%;
      padding: 18px;
      background: #e91e63;
      color: white;
      font-size: 20px;
      font-weight: bold;
      border: none;
      border-radius: 50px;
      text-decoration: none;
      box-shadow: 0 0 25px #e91e63;
      box-sizing: border-box;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.03); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>VOCÊ TEM 5 SEGUNDOS PARA ENTRAR</h2>
    
    <div id="timer-container">
      <div id="timer">00:05</div>
    </div>

    <div class="video-wrapper">
      <video class="midia-video" autoplay loop muted playsinline>
        <source src="https://files.catbox.moe/6b42bh.mp4" type="video/mp4">
      </video>
    </div>

    <div class="liberado" id="liberado">
      🔥 ACESSO VIP LIBERADO 🔥
    </div>

    <p class="passo-final" id="passo">
      PASSO FINAL: Toque nos 3 PONTOS e escolha ABRIR NO NAVEGADOR.
    </p>
    
    <a href="https://linkpriv.com/1ec38631-15bb-4b46-9981-cce5654b6e9d" id="btnAcesso" class="btn">
      QUERO ACESSAR AGORA 🔥
    </a>
  </div>

  <script>
    let tempo = 5;
    const timerEl = document.getElementById('timer');
    const timerCont = document.getElementById('timer-container');
    const liberado = document.getElementById('liberado');
    const passo = document.getElementById('passo');
    const btn = document.getElementById('btnAcesso');

    const intervalo = setInterval(() => {
      tempo--;
      timerEl.textContent = `00:0${tempo}`;

      if (tempo <= 0) {
        clearInterval(intervalo);
        timerCont.style.display = 'none'; // Esconde o timer após zerar
        liberado.style.display = 'block';
        passo.style.display = 'block';
        btn.style.display = 'block';
      }
    }, 1000);
  </script>

</body>
</html>
