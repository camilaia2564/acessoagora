<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACESSO EXCLUSIVO</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body, html {
      background: linear-gradient(180deg, #000000, #1a0033);
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .container {
      max-width: 420px;
      margin: 0 auto;
      padding: 20px 15px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    h2 { 
      font-size: 17px; 
      margin-bottom: 15px; 
      text-transform: uppercase; 
    }
    #timer {
      font-size: 82px;
      font-weight: bold;
      color: #ff0066;
      margin: 10px 0 20px;
      text-shadow: 0 0 30px #ff0066;
    }
    .video-wrapper {
      width: 100%;
      max-width: 380px;
      aspect-ratio: 1 / 1;   /* ← FORMATO QUADRADO PERFEITO */
      border-radius: 14px;
      overflow: hidden;
      border: 2px solid #e91e63;
      margin: 15px 0 25px;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .liberado {
      font-size: 26px;
      font-weight: bold;
      color: #ffcc00;
      display: none;
      margin: 15px 0;
    }
    .sigilo {
      font-size: 16px;
      margin: 10px 0 25px;
      opacity: 0.9;
      display: none;
    }
    .passo-final {
      font-size: 14px;
      color: #ff0066;
      margin-top: 30px;
      text-transform: uppercase;
      font-weight: bold;
      display: none;
    }
    .btn {
      display: none;
      width: 90%;
      margin: 20px auto;
      padding: 18px;
      background: #e91e63;
      color: white;
      font-size: 23px;
      font-weight: bold;
      border-radius: 50px;
      text-decoration: none;
      box-shadow: 0 0 30px #e91e63;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>VOCE TEM 5 SEGUNDOS PARA GARANTIR SEU ACESSO EXCLUSIVO</h2>
    
    <div id="timer">00:05</div>

    <!-- Vídeo quadrado -->
    <div class="video-wrapper">
      <video autoplay loop muted playsinline>
        <source src="https://files.catbox.moe/6b42bh.mp4" type="video/mp4">
      </video>
    </div>

    <div class="liberado" id="liberado">
      🔥 ACESSO EXCLUSIVO LIBERADO 🔥
    </div>

    <p class="sigilo" id="sigilo">
      Entre com sigilo total e aproveite tudo.
    </p>

    <p class="passo-final" id="passo">
      PASSO FINAL: Toque nos 3 PONTOS acima e escolha ABRIR NO NAVEGADOR.
    </p>

    <a href="https://linkpriv.com/1ec38631-15bb-4b46-9981-cce5654b6e9d" 
       id="btnAcesso" 
       class="btn">
      QUERO GARANTIR AGORA 🔥
    </a>
  </div>

  <script>
    let tempo = 5;
    const timerEl = document.getElementById('timer');
    const liberadoEl = document.getElementById('liberado');
    const sigiloEl = document.getElementById('sigilo');
    const passoEl = document.getElementById('passo');
    const btnEl = document.getElementById('btnAcesso');

    liberadoEl.style.display = 'none';
    sigiloEl.style.display = 'none';
    passoEl.style.display = 'none';
    btnEl.style.display = 'none';

    const intervalo = setInterval(() => {
      tempo--;
      timerEl.textContent = `00:0${tempo}`;

      if (tempo <= 0) {
        clearInterval(intervalo);
        timerEl.style.display = 'none';
        liberadoEl.style.display = 'block';
        sigiloEl.style.display = 'block';
        passoEl.style.display = 'block';
        btnEl.style.display = 'block';
      }
    }, 1000);
  </script>
</body>
</html>
