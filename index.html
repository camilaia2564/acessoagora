<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACESSO PREMIUM LIBERADO</title>
  <style>
    body {
      margin: 0; padding: 0;
      background: linear-gradient(180deg, #000000, #1a0033);
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .container {
      max-width: 420px;
      margin: 20px auto;
      padding: 25px 15px;
      border: 3px solid #e91e63;
      border-radius: 20px;
      background: rgba(0,0,0,0.9);
    }
    h2 { font-size: 17px; margin: 10px 0 15px; text-transform: uppercase; }
    #timer {
      font-size: 78px;
      font-weight: bold;
      color: #ff0066;
      margin: 10px 0 20px;
      text-shadow: 0 0 25px #ff0066;
    }
    .midia-container {
      width: 100%;
      border-radius: 12px;
      margin: 15px 0 25px;
      border: 2px solid #e91e63;
      display: block;
    }
    .liberado {
      font-size: 26px;
      font-weight: bold;
      color: #ffcc00;
      display: none;
      margin: 15px 0;
    }
    .sigilo {
      font-size: 16px;
      margin: 10px 0 25px;
      opacity: 0.9;
      display: none;
    }
    .passo-final {
      font-size: 14px;
      color: #ff0066;
      margin: 30px 0 20px;
      text-transform: uppercase;
      font-weight: bold;
      display: none;
    }
    .btn {
      display: none;
      width: 88%;
      max-width: 350px;
      margin: 20px auto;
      padding: 18px;
      background: #e91e63;
      color: white;
      font-size: 23px;
      font-weight: bold;
      border: none;
      border-radius: 50px;
      text-decoration: none;
      box-shadow: 0 0 30px #e91e63;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>VOCÊ TEM 5 SEGUNDOS PARA ENTRAR NA NUVEM PREMIUM</h2>
    
    <div id="timer">00:05</div>

    <img src="https://i.ibb.co/Psr00KC3/imagem.jpg" class="midia-container" alt="Tutorial Passo a Passo">

    <div class="liberado" id="liberado">
      🔥 ACESSO PRIVADO LIBERADO 🔥
    </div>

    <p class="sigilo" id="sigilo">
      Aproveite todo o conteúdo com sigilo total.
    </p>

    <p class="passo-final" id="passo">
      PASSO FINAL: Toque nos 3 PONTOS e escolha ABRIR NO NAVEGADOR.
    </p>
    
    <a href="COLOQUE_SEU_LINK_AQUI" id="btnAcesso" class="btn">
      QUERO ACESSAR AGORA 🔥
    </a>
  </div>

  <script>
    let tempo = 5;
    const timerEl = document.getElementById('timer');
    const ids = ['liberado', 'sigilo', 'passo', 'btnAcesso'];

    const intervalo = setInterval(() => {
      tempo--;
      timerEl.textContent = `00:0${tempo}`;

      if (tempo <= 0) {
        clearInterval(intervalo);
        timerEl.style.display = 'none';
        ids.forEach(id => document.getElementById(id).style.display = 'block');
      }
    }, 1000);
  </script>
</body>
</html>
