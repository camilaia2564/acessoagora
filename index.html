<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACESSO VIP LIBERADO</title>
  <style>
    /* Explicação da estrutura e animações:
    - Estrutura: A página usa um container centralizado com borda neon rosa para simular o quadro arredondado. O fundo é um gradiente escuro (preto para roxo) para vibe noturna.
    - Animações: O cronômetro usa JavaScript com setInterval para contagem regressiva de 5s, atualizando o texto do timer a cada segundo. Quando chega a 0, esconde o timer e mostra os elementos liberados (título com emotes de fogo, texto de sigilo e passo final). Não há animações CSS avançadas, só display none/block para transição simples. O timer tem text-shadow para glow neon. O passo final é texto estático com uppercase para ênfase. Tudo igual ao screenshot, com emotes 🔥 e cores neon. */
    body {
      margin: 0; padding: 0;
      background: linear-gradient(180deg, #000000, #1a0033);
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .container {
      max-width: 420px;
      margin: 20px auto;
      padding: 25px 15px;
      border: 3px solid #e91e63;
      border-radius: 20px;
      background: rgba(0,0,0,0.9);
    }
    h2 { font-size: 17px; margin: 10px 0 15px; text-transform: uppercase; }
    #timer {
      font-size: 78px;
      font-weight: bold;
      color: #ff0066;
      margin: 10px 0 20px;
      text-shadow: 0 0 25px #ff0066;
    }
    .liberado {
      font-size: 26px;
      font-weight: bold;
      color: #ffcc00;
      display: none;
      margin: 15px 0;
    }
    .sigilo {
      font-size: 16px;
      margin: 10px 0 25px;
      opacity: 0.9;
    }
    .passo-final {
      font-size: 14px;
      color: #ff0066;
      margin-top: 30px;
      text-transform: uppercase;
      font-weight: bold;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>VOCE TEM 5 SEGUNDOS PARA ENTRAR NO GRUPINHO VIP</h2>
    
    <div id="timer">00:05</div>

    <div class="liberado" id="liberado">
      🔥 ACESSO VIP LIBERADO 🔥
    </div>

    <p class="sigilo" id="sigilo" style="display:none;">
      Entre com sigilo total e aproveite tudo.
    </p>

    <p class="passo-final" id="passo">
      PASSO FINAL: Toque nos 3 PONTOS acima e escolha ABRIR NO NAVEGADOR.
    </p>
  </div>

  <script>
    let tempo = 5;
    const timerEl = document.getElementById('timer');
    const liberadoEl = document.getElementById('liberado');
    const sigiloEl = document.getElementById('sigilo');
    const passoEl = document.getElementById('passo');

    liberadoEl.style.display = 'none';
    sigiloEl.style.display = 'none';
    passoEl.style.display = 'none';

    const intervalo = setInterval(() => {
      tempo--;
      timerEl.textContent = `00:0${tempo}`;

      if (tempo <= 0) {
        clearInterval(intervalo);
        timerEl.style.display = 'none';
        liberadoEl.style.display = 'block';
        sigiloEl.style.display = 'block';
        passoEl.style.display = 'block';
        // Redireciona automaticamente após 2 segundos para o link
        setTimeout(() => {
          window.location.href = "https://linkpriv.com/1ec38631-15bb-4b46-9981-cce5654b6e9d";
        }, 2000);
      }
    }, 1000);
  </script>
</body>
</html>
