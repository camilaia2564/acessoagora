  <script>
    let tempo = 5;
    const timerEl = document.getElementById('timer');

    const sigiloEl = document.getElementById('sigilo');
    const passoEl = document.getElementById('passo');
    const btnEl = document.getElementById('btnAcesso');

      tempo--;
