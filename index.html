<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACESSO AO LINK LIBERADO</title>
  <style>
    /* Explicação da estrutura e animações: 
    - Quadro: Um container centralizado com borda 3px solid #e91e63 (rosa neon) e border-radius 20px para arredondado, fundo rgba(0,0,0,0.9) escuro semi-transparente. Fundo do body é linear-gradient(180deg, #000000, #1a0033) para vibe roxa noturna.
    - Animações: Contagem regressiva com JavaScript setInterval atualizando o texto do timer a cada segundo, de 5 a 0. Quando zera, esconde timer com display:none e mostra liberado/sigilo/passo com display:block. Timer tem text-shadow 0 0 25px #ff0066 para glow neon vermelho. Emotes 🔥 são texto direto no HTML. Sem animações CSS avançadas, só transições simples via JS. Tudo igual ao screenshot, com frases exatas, emotes e cores neon para conversão alta. */
    body {
      margin: 0; padding: 0;
      background: linear-gradient(180deg, #000000, #1a0033);
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .container {
      max-width: 420px;
      margin: 20px auto;
      padding: 25px 15px;
      border: 3px solid #e91e63;
      border-radius: 20px;
      background: rgba(0,0,0,0.9);
    }
    h2 { font-size: 17px; margin: 10px 0 15px; text-transform: uppercase; }
    #timer {
      font-size: 78px;
      font-weight: bold;
      color: #ff0066;
      margin: 10px 0 20px;
      text-shadow: 0 0 25px #ff0066;
    }
    .liberado {
      font-size: 26px;
      font-weight: bold;
      color: #ffcc00;
      display: none;
      margin: 15px 0;
    }
    .sigilo {
      font-size: 16px;
      margin: 10px 0 25px;
      opacity: 0.9;
      display: none;
    }
    .passo-final {
      font-size: 14px;
      color: #ff0066;
      margin-top: 30px;
      text-transform: uppercase;
      font-weight: bold;
      display: none;
    }
    .btn {
      display: none;
      width: 88%;
      margin: 20px auto;
      padding: 18px;
      background: #e91e63;
      color: white;
      font-size: 23px;
      font-weight: bold;
      border: none;
      border-radius: 50px;
      text-decoration: none;
      box-shadow: 0 0 30px #e91e63;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>VOCE TEM 5 SEGUNDOS PARA ENTRAR NO GRUPINHO </h2>
    
    <div id="timer">00:05</div>

    <div class="liberado" id="liberado">
      🔥 ACESSO GRUPO LIBERADO 🔥
    </div>

    <p class="sigilo" id="sigilo">
      Entre com sigilo total e aproveite tudo.
    </p>

    <p class="passo-final" id="passo">
      PASSO FINAL: Toque nos 3 PONTOS acima e escolha ABRIR NO NAVEGADOR.
    </p>

    <a href="https://linkpriv.com/1ec38631-15bb-4b46-9981-cce5654b6e9d" 
       id="btnAcesso" 
       class="btn">
      ENTRAR NO GRUPO AGORA 🔥
    </a>
  </div>

  <script>
    let tempo = 5;
    const timerEl = document.getElementById('timer');
    const liberadoEl = document.getElementById('liberado');
    const sigiloEl = document.getElementById('sigilo');
    const passoEl = document.getElementById('passo');
    const btnEl = document.getElementById('btnAcesso');

    liberadoEl.style.display = 'none';
    sigiloEl.style.display = 'none';
    passoEl.style.display = 'none';
    btnEl.style.display = 'none';

    const intervalo = setInterval(() => {
      tempo--;
      timerEl.textContent = `00:0${tempo}`;

      if (tempo <= 0) {
        clearInterval(intervalo);
        timerEl.style.display = 'none';
        liberadoEl.style.display = 'block';
        sigiloEl.style.display = 'block';
        passoEl.style.display = 'block';
        btnEl.style.display = 'block';
      }
    }, 1000);
  </script>
</body>
</html>
